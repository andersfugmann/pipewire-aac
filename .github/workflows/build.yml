name: Build PipeWire with AAC

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    container: debian:sid
    steps:
      - name: Install tools
        run: apt-get update -qq && apt-get install -y -qq git curl make

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if already built
        id: check
        run: |
          VERSION=$(make version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          BUILT=$(curl -sf "https://${{ github.repository_owner }}.github.io/pipewire-aac/VERSION" || echo "")
          if [ "$BUILT" = "$VERSION" ]; then
            echo "Version $VERSION already published, skipping"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION (published: ${BUILT:-none})"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        if: steps.check.outputs.needs_build == 'true'
        run: |
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/*.sources
          apt-get update -qq
          make deps

      - name: Build packages
        if: steps.check.outputs.needs_build == 'true'
        run: make all

      - name: Record version
        if: steps.check.outputs.needs_build == 'true'
        run: echo "${{ steps.check.outputs.version }}" > repo/VERSION

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.needs_build == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          keep_files: false
